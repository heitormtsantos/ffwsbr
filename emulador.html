<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novo Projeto</title>
<style>
    /* ==========================================================================
       Variáveis de Cores e Fundo (Copiado do original)
       ========================================================================== */
    :root {
        --bg-color: #0f0f11; --panel-bg: #1c1c20; --panel-hover: #26262b;
        --border: #333338; --accent: #ffaa00; --text: #ffffff;
        --text-muted: #9aa0a6; --win-color: #4caf50; --lose-color: #f44336;
    }
    body { 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        background-color: var(--bg-color); 
        color: var(--text); 
        margin: 0; 
        padding: 0; 
    }
    
    /* ==========================================================================
       Navegação
       ========================================================================== */
    nav { 
        background-color: #050505; 
        border-bottom: 2px solid var(--accent); 
        position: sticky; 
        top: 0; 
        z-index: 100; 
        box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
    }
    
    .nav-header-mobile { display: none; justify-content: space-between; align-items: center; padding: 15px 20px; }
    .nav-header-mobile span { color: var(--accent); font-weight: bold; font-size: 1.2em; text-transform: uppercase; letter-spacing: 1px; }
    
    #hamburger-btn { 
        background: transparent; color: var(--accent); border: 1px solid var(--accent); 
        font-size: 1.5em; cursor: pointer; padding: 5px 12px; border-radius: 6px; transition: 0.2s; 
    }
    #hamburger-btn:hover { background: var(--accent); color: #000; }
    
    .nav-links { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; padding: 15px 20px; }
    .nav-links button { 
        background-color: transparent; color: var(--text); border: 1px solid var(--border); 
        padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 0.95em; 
    }
    .nav-links button:hover, .nav-links button.active { 
        background-color: var(--accent); color: #000; border-color: var(--accent); 
    }

    @media (max-width: 768px) {
        .nav-header-mobile { display: flex; }
        .nav-links { display: none; flex-direction: column; padding: 0 20px 15px 20px; }
        .nav-links.active { display: flex; animation: fadeIn 0.3s ease-in-out; }
        .nav-links button { width: 100%; text-align: center; padding: 15px; font-size: 1.05em; }
    }
    
    /* ==========================================================================
       Container Principal e Troca de Páginas
       ========================================================================== */
    .container { padding: 30px 20px; max-width: 1400px; margin: 0 auto; }
    .page { display: none; animation: fadeIn 0.3s ease-in-out; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    /* ==========================================================================
       Estilo para o texto "EM BREVE"
       ========================================================================== */
    .em-breve-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 60vh;
        text-align: center;
    }
    .em-breve-container h1 {
        font-size: 4em; 
        color: var(--accent); 
        text-shadow: 0 0 20px rgba(255, 170, 0, 0.4); 
        margin-bottom: 10px; 
        text-transform: uppercase; 
        letter-spacing: 2px;
    }
    .em-breve-container p {
        color: var(--text-muted);
        font-size: 1.2em;
    }
</style>
</head>
<body>

<nav>
    <div class="nav-header-mobile">
        <span>MENU</span>
        <button id="hamburger-btn" onclick="toggleMobileMenu()">☰</button>
    </div>

    <div class="nav-links" id="nav-links">
        <button onclick="navigate('pagina-inicial')" class="active" id="nav-pagina-inicial">Página Inicial</button>
        <button onclick="navigate('tabela-titulos')" id="nav-tabela-titulos">Tabela de Títulos</button>
        <button onclick="navigate('hall-fama')" id="nav-hall-fama">Hall da Fama</button>
    </div>
</nav>

<div class="container">
    
    <div id="pagina-inicial" class="page active">
        <div class="em-breve-container">
            <h1>EM BREVE</h1>
            <p>Página Inicial em construção.</p>
        </div>
    </div>

    <div id="tabela-titulos" class="page">
        <div class="em-breve-container">
            <h1>EM BREVE</h1>
            <p>Tabela de Títulos em construção.</p>
        </div>
    </div>

    <div id="hall-fama" class="page">
        <div class="em-breve-container">
            <h1>EM BREVE</h1>
            <p>Hall da Fama em construção.</p>
        </div>
    </div>

</div>

<script>
    // Função para navegar entre as abas (mantida do seu código original)
    function navigate(pageId) {
        // Esconde todas as páginas e tira o destaque dos botões
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-links button').forEach(b => b.classList.remove('active'));
        
        // Mostra a página selecionada
        document.getElementById(pageId).classList.add('active');
        
        // Destaca o botão correto no menu
        let btn = document.getElementById('nav-' + pageId);
        if(btn) btn.classList.add('active');
        
        // Fecha o menu no mobile após clicar
        if (window.innerWidth <= 768) {
            document.getElementById('nav-links').classList.remove('active');
        }
    }

    // Função para abrir/fechar o menu no celular
    function toggleMobileMenu() {
        document.getElementById('nav-links').classList.toggle('active');
    }
</script>

</body>
</html>
